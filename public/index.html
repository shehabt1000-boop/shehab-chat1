<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>شات موبايل متجاوب</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin:0; padding:0;
    background: #f0f0f0;
  }
  #login, #chat {
    max-width: 480px;
    margin: 20px auto;
    background: white;
    border-radius: 8px;
    padding: 15px;
    box-sizing: border-box;
  }
  #login input[type="text"], #messageInput {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    box-sizing: border-box;
    margin-bottom: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  #login label {
    font-size: 18px;
    margin-left: 15px;
  }
  #login button, #sendBtn, #emojiBtn, #logoutBtn {
    width: 100%;
    padding: 14px;
    font-size: 20px;
    background: #007bff;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 10px;
  }
  #sendBtn, #emojiBtn {
    width: auto;
    padding: 12px 18px;
    margin-left: 5px;
  }
  #chat #users {
    font-size: 16px;
    margin-bottom: 10px;
    overflow-x: auto;
    white-space: nowrap;
    padding-bottom: 5px;
    border-bottom: 1px solid #ccc;
  }
  #users span {
    display: inline-block;
    margin-left: 10px;
    padding: 5px 8px;
    background: #e9e9e9;
    border-radius: 20px;
  }
  #messages {
    height: 400px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 10px;
    font-size: 18px;
    border-radius: 6px;
    margin-bottom: 8px;
  }
  .message {
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    background: #f9f9f9;
    position: relative;
  }
  .message.own {
    background: #d1e7dd;
  }
  .message strong {
    font-size: 16px;
  }
  .message small {
    font-size: 12px;
    color: #666;
    position: absolute;
    top: 8px;
    left: 10px;
  }
  #inputArea {
    display: flex;
    align-items: center;
  }
  #messageInput {
    flex: 1;
    font-size: 18px;
    border-radius: 6px;
  }
  #emojiPicker {
    position: fixed;
    bottom: 70px;
    right: 15px;
    background: white;
    border: 1px solid #ccc;
    border-radius: 8px;
    display: none;
    padding: 10px;
    gap: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.15);
    user-select: none;
  }
  #emojiPicker span {
    cursor: pointer;
    font-size: 28px;
    padding: 5px;
  }
  #replyBox {
    background: #eef;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
    display: none;
    font-size: 16px;
    position: relative;
  }
  #replyBox button {
    position: absolute;
    left: 10px;
    top: 10px;
    background: transparent;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #333;
  }
  #typingIndicator {
    font-style: italic;
    color: #555;
    height: 22px;
    margin-bottom: 10px;
  }

  /* ====== ميديا كويريز لتصغير الشاشات ====== */
  @media (max-width: 480px) {
    #messages {
      height: 300px;
      font-size: 16px;
    }
    #login button, #sendBtn, #emojiBtn, #logoutBtn {
      font-size: 18px;
      padding: 12px;
    }
    #messageInput {
      font-size: 16px;
      padding: 10px;
    }
  }
</style>
</head>
<body>

<div id="login">
  <h2>تسجيل دخول</h2>
  <input id="username" placeholder="اسمك" autocomplete="off" />
  <br/>
  <label><input type="radio" name="gender" value="male" checked /> ذكر</label>
  <label><input type="radio" name="gender" value="female" /> أنثى</label>
  <br/><br/>
  <button id="loginBtn">دخول الشات</button>
</div>

<div id="chat" style="display:none;">
  <h2>الشات</h2>
  <div id="users"></div>
  <div id="messages"></div>
  <div id="typingIndicator"></div>

  <div id="replyBox">
    <button id="cancelReplyBtn" title="إلغاء الرد">&times;</button>
    <span id="replyInfo"></span>
  </div>

  <div id="inputArea">
    <button id="emojiBtn">😀</button>
    <input id="messageInput" placeholder="اكتب رسالة..." autocomplete="off" />
    <button id="sendBtn">إرسال</button>
  </div>
  
  <button id="logoutBtn">تسجيل خروج</button>

  <div id="emojiPicker">
    <span>😀</span>
    <span>😂</span>
    <span>😍</span>
    <span>😎</span>
    <span>😢</span>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  // العناصر
  const loginDiv = document.getElementById('login');
  const chatDiv = document.getElementById('chat');
  const usernameInput = document.getElementById('username');
  const loginBtn = document.getElementById('loginBtn');
  const genderInputs = document.querySelectorAll('input[name="gender"]');
  const usersDiv = document.getElementById('users');
  const messagesDiv = document.getElementById('messages');
  const typingIndicator = document.getElementById('typingIndicator');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const emojiBtn = document.getElementById('emojiBtn');
  const emojiPicker = document.getElementById('emojiPicker');
  const replyBox = document.getElementById('replyBox');
  const replyInfo = document.getElementById('replyInfo');
  const cancelReplyBtn = document.getElementById('cancelReplyBtn');
  const logoutBtn = document.getElementById('logoutBtn');

  let currentUser = null;
  let messages = [];
  let replyTo = null;
  let typingTimeout = null;

  // تسجيل الدخول
  loginBtn.onclick = () => {
    const username = usernameInput.value.trim();
    if(!username){
      alert('اكتب اسمك!');
      return;
    }
    let gender = 'male';
    genderInputs.forEach(radio => {
      if(radio.checked) gender = radio.value;
    });

    currentUser = {
      username,
      gender,
      sessionId: localStorage.getItem('sessionId') || Math.random().toString(36).slice(2,10)
    };

    socket.emit('register', currentUser);
  };

  socket.on('loggedIn', user => {
    currentUser = user;
    localStorage.setItem('sessionId', user.sessionId);
    loginDiv.style.display = 'none';
    chatDiv.style.display = 'block';
  });

  socket.on('chatHistory', msgs => {
    messages = msgs;
    messagesDiv.innerHTML = '';
    msgs.forEach(addMessage);
    scrollToBottom();
  });

  socket.on('chatMessage', msg => {
    messages.push(msg);
    addMessage(msg);
    scrollToBottom();
  });

  socket.on('usersUpdate', users => {
    usersDiv.innerHTML = '';
    users.forEach(u => {
      const span = document.createElement('span');
      span.textContent = u.username + (u.connected ? " (متصل الآن)" : " (غير متصل)");
      usersDiv.appendChild(span);
    });
  });

  messageInput.addEventListener('input', () => {
    socket.emit('typing', true);
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => socket.emit('typing', false), 1500);
  });

  socket.on('typing', data => {
    if(data.isTyping){
      typingIndicator.textContent = data.username + ' يكتب الآن...';
    } else {
      typingIndicator.textContent = '';
    }
  });

  sendBtn.onclick = sendMessage;
  messageInput.addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  function sendMessage(){
    const text = messageInput.value.trim();
    if(!text) return;

    socket.emit('chatMessage', { message: text, replyTo });
    messageInput.value = '';
    cancelReplyFunc();
  }

  function addMessage(msg){
    if(messagesDiv.querySelector(`[data-id="${msg.id}"]`)) return;

    const div = document.createElement('div');
    div.classList.add('message');
    if(msg.userSessionId === currentUser.sessionId) div.classList.add('own');
    div.dataset.id = msg.id;

    let replyText = '';
    if(msg.replyTo){
      const repliedMsg = messages.find(m => m.id === msg.replyTo);
      if(repliedMsg){
        replyText = `رد على ${repliedMsg.username}: ${repliedMsg.message}`;
      }
    }

    div.innerHTML = `
      <strong>${msg.username}</strong> <small>(${msg.time})</small><br>
      ${replyText ? `<em style="font-size:12px;color:#555;">${replyText}</em><br>` : ''}
      <span>${msg.message}</span>
    `;

    messagesDiv.appendChild(div);
  }

  cancelReplyBtn.onclick = cancelReplyFunc;
  function cancelReplyFunc(){
    replyTo = null;
    replyBox.style.display = 'none';
    replyInfo.textContent = '';
  }

  emojiBtn.onclick = () => {
    emojiPicker.style.display = emojiPicker.style.display === 'flex' ? 'none' : 'flex';
  };

  emojiPicker.querySelectorAll('span').forEach(span => {
    span.onclick = () => {
      messageInput.value += span.textContent;
      emojiPicker.style.display = 'none';
      messageInput.focus();
    };
  });

  logoutBtn.onclick = () => {
    localStorage.removeItem('sessionId');
    location.reload();
  };

  function scrollToBottom(){
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
</script>

</body>
</html>
